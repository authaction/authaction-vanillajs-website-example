<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AuthAction — VanillaJS Example</title>
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>

    <div id="app" style="display:none">

      <!-- Navbar -->
      <nav class="navbar">
        <div class="navbar-brand">
          <svg class="brand-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect width="24" height="24" rx="6" fill="#6366f1"/>
            <path d="M7 17L12 7L17 17" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M9 13H15" stroke="white" stroke-width="2" stroke-linecap="round"/>
          </svg>
          <span class="navbar-title">AuthAction</span>
        </div>
        <div class="navbar-actions">
          <span class="demo-badge">Demo App</span>
          <span class="badge">VanillaJS</span>
          <button id="login-nav-btn" class="btn btn-ghost">Log in</button>
          <button id="signup-nav-btn" class="btn btn-primary btn-sm">Sign up</button>
        </div>
      </nav>

      <!-- Hero -->
      <main class="hero">
        <p class="hero-eyebrow">Identity &amp; Access Management</p>
        <h1 class="hero-title">Authentication made simple</h1>
        <p class="hero-subtitle">
          Secure, fast, and developer-friendly OAuth2 authentication for your applications.
        </p>
        <div class="hero-actions">
          <button id="signup-hero-btn" class="btn btn-primary btn-lg">Get started free</button>
          <button id="login-hero-btn" class="btn btn-outline btn-lg">Log in</button>
        </div>
      </main>

    </div>

    <!-- Loading spinner (shown until JS resolves session) -->
    <div id="loading-state" class="screen-center">
      <div class="spinner"></div>
    </div>

    <script type="module">
      import * as oauth from './src/oauth.js';

      const isAuthenticated = await oauth.client.isAuthenticated();

      if (isAuthenticated) {
        window.location.replace('/claims.html');
      } else {
        document.getElementById('loading-state').style.display = 'none';
        document.getElementById('app').style.display = 'flex';
        document.getElementById('app').style.flexDirection = 'column';
        document.getElementById('app').style.minHeight = '100vh';

        document.getElementById('login-nav-btn').addEventListener('click', () => oauth.login());
        document.getElementById('login-hero-btn').addEventListener('click', () => oauth.login());
        document.getElementById('signup-nav-btn').addEventListener('click', () => oauth.signup());
        document.getElementById('signup-hero-btn').addEventListener('click', () => oauth.signup());
      }
    </script>
  </body>
</html>
